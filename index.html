<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Current Time Now</title>

<style>
body{
font-family:Arial;
background:#fafafa;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
text-align:center;
}

.clock{
font-size:80px;
font-weight:bold;
}

.date{
font-size:20px;
margin-top:10px;
}
</style>
</head>

<body>

<div>
<h1>Current Time</h1>

<div id="clock" class="clock"></div>
<div id="date" class="date"></div>

</div>

<script>

function updateClock(){

const now = new Date()

document.getElementById("clock").innerHTML =
now.toLocaleTimeString()

document.getElementById("date").innerHTML =
now.toDateString()

}

setInterval(updateClock,1000)

updateClock()

</script>

</body>
</html>
